name: bandao_app
description: "Bandao (班到) mobile app for AppUsers."
publish_to: 'none'

version: 0.4.2+12

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Logging
  logger: ^2.5.0

  # Firebase / Crashlytics — client crash + non-fatal error reporting.
  # No setUserIdentifier call is wired in; crashes stay unlinked from
  # Bandao identity per the mobile-release spec.
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3

  # Location
  geolocator: ^13.0.1
  app_settings: ^5.1.1

  # Map rendering for the "我的工作日記" trajectory view. Uses OpenStreetMap
  # tiles via CARTO Positron (free, attribution-only). latlong2 is also the
  # coordinate type flutter_map exposes; reused for geodesic distance.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Open privacy policy URL in an in-app browser from the consent dialog.
  url_launcher: ^6.3.1

  # Connectivity
  connectivity_plus: ^6.1.0

  # Background sync. Pinned >=0.6.0 because that's where the plugin
  # dropped Flutter v1 embedding APIs (`shim`, `ShimPluginRegistry`,
  # `Registrar`) — those don't exist in Flutter 3.27+ and break Android
  # release compile if older workmanager is used.
  workmanager: ">=0.9.0 <0.10.0"

  # Local SQLite queue (drift)
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Integration test driver for automated store-metadata screenshots.
  # See test_driver/integration_driver.dart + integration_test/screenshot_test.dart
  # + scripts/take_screenshots.sh.
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Codegen for drift
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

  # url_launcher mocking in widget tests
  plugin_platform_interface: ^2.1.8
  url_launcher_platform_interface: ^2.3.2

  # App icon + splash generation
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/icon/icon.png

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true

flutter_native_splash:
  color: "#DBB683"
  image: assets/icon/icon.png
  android: true
  ios: true
  android_12:
    color: "#DBB683"
    image: assets/icon/icon.png
