server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # nginx sits behind Zeabur's TLS-terminating proxy. Without this, the
  # automatic 301 from `/login` to `/login/` (triggered by try_files $uri/)
  # builds a Location with the internal $scheme + :8080, breaking refresh
  # on any directory-style route.
  absolute_redirect off;

  # Hashed Nuxt assets are immutable; cache hard.
  location /_nuxt/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: any unknown path serves the index, the client router
  # picks it up.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
