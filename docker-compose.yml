services:
  mongodb:
    image: mongo:7
    container_name: bandao-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: bandao
      MONGO_INITDB_ROOT_PASSWORD: bandao
      MONGO_INITDB_DATABASE: bandao
    volumes:
      - bandao_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  bandao_mongodb_data:
    name: bandao_mongodb_data
