services:
  mongodb:
    image: mongo:7
    container_name: argus-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: argus
      MONGO_INITDB_ROOT_PASSWORD: argus
      MONGO_INITDB_DATABASE: argus
    volumes:
      - argus_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  argus_mongodb_data:
    name: argus_mongodb_data
