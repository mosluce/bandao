name: api

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api.yml'
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Detect whether this component changed. On pull_request we diff against
      # the PR merge base using git only (no third-party actions); the heavy
      # steps below are gated on the result. The job still concludes success
      # when api/ is untouched, so the required check reports green without a
      # full build. See openspec change add-ci-path-scoped-checks.
      - name: Detect changes
        id: changed
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD" \
               | grep -qE '^(api/|\.github/workflows/api\.yml)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=api::no api/ changes in this PR — skipping fmt/clippy/test"
          fi

      - name: Install Rust toolchain
        if: steps.changed.outputs.run == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ''
          cache-workspaces: api

      - name: cargo fmt --check
        if: steps.changed.outputs.run == 'true'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: steps.changed.outputs.run == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        if: steps.changed.outputs.run == 'true'
        run: cargo test --all-features --no-fail-fast
